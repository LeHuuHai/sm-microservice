openapi: 3.0.3

info:
  title: Heartbeat Gateway API
  version: 1.0.0
  description: API for server heartbeat ingestion.

servers:
  - url: http://localhost:8082

paths:
  /heartbeat:
    post:
      tags:
        - Heartbeat
      summary: Send server heartbeat
      operationId: SendHeartbeat

      security:
        - apiKeyAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeartbeatRequest'

      responses:
        '202':
          description: Heartbeat accepted

        "400":
          $ref: "#/components/responses/BadRequest"

        '401':
          $ref: '#/components/responses/Unauthorized'

        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    HeartbeatRequest:
      type: object
      required:
      - server_id
      properties:
        server_id:
          type: string
    
    ErrorResponse:
      type: object
      properties:
        code:
          type: string

        message:
          type: string

        request_id:
          type: string
    
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
