version: "3.8"

x-kafka-env: &kafka-env
  KAFKA_BROKER: kafka:29092
  KAFKA_HEARTBEAT_TOPIC: heartbeat
  KAFKA_MAIL_TOPIC: mail
  KAFKA_PING_TOPIC: ping
  KAFKA_PING_RES_TOPIC: ping_res
  KAFKA_SERVER_TOPIC: server_events

services:

#----------------------------------------- Auth service ----------------------------------------- 
  auth-service:
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-auth-service:latest
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      JWT_ACCESS_EXPIRED: 900
      JWT_REFRESH_EXPIRED: 604800
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: admin
      DB_DBNAME: auth_db
      REDIS_URL: auth-redis:6379
      REDIS_DB: 0
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - auth_db_password
    networks:
      - sm_network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
        - "traefik.http.services.auth.loadbalancer.server.port=8080"
        - "traefik.http.middlewares.cors-mw.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE,PATCH"
        - "traefik.http.middlewares.cors-mw.headers.accesscontrolallowheaders=Origin,Content-Type,Accept,Authorization,X-API-Key"
        - "traefik.http.middlewares.cors-mw.headers.accesscontrolalloworiginlist=http://localhost:3000,http://localhost,http://192.168.9.250"
        - "traefik.http.middlewares.cors-mw.headers.accesscontrolmaxage=100"
        - "traefik.http.middlewares.cors-mw.headers.addvaryheader=true"
        - "traefik.http.routers.auth.middlewares=cors-mw"
        - "traefik.http.middlewares.auth-and-cors.chain.middlewares=cors-mw,auth-mw"
        # ForwardAuth middleware for Traefik to parse JWT and inject headers
        # NOTE: auth-service needs an endpoint at /auth/verify that validates JWT and returns X-User-Role
        - "traefik.http.middlewares.auth-mw.forwardauth.address=http://auth-service:8080/auth/verify"
        - "traefik.http.middlewares.auth-mw.forwardauth.trustForwardHeader=true"
        - "traefik.http.middlewares.auth-mw.forwardauth.authResponseHeaders=X-User-Role,X-User-ID"

#----------------------------------------- Server service ----------------------------------------- 
  server-service:
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-server-service:latest
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DB_HOST: server-db
      DB_PORT: 5432
      DB_USER: admin
      DB_DBNAME: server_db
      <<: *kafka-env
    secrets:
      - server_db_password
    networks:
      - sm_network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.server.rule=PathPrefix(`/servers`)"
        - "traefik.http.routers.server.middlewares=auth-and-cors"
        - "traefik.http.services.server.loadbalancer.server.port=8080"

#----------------------------------------- Monitor service ----------------------------------------- 
  monitor-service:
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-monitor-service:latest
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_GRPC_PORT: 8180
      CYCLE_PING: 5000
      HEARTBEAT_TIMEOUT: 10000
      AD_MAIL: hai.lh03.work@gmail.com
      DB_HOST: monitor-db
      DB_PORT: 5432
      DB_USER: admin
      DB_DBNAME: monitor_db
      ES_URL: http://monitor-elasticsearch:9200
      ES_INDEX: heartbeat
      REDIS_URL: monitor-redis:6379
      REDIS_DB: 0
      <<: *kafka-env
      KAFKA_SERVER_EVENT_GROUP_ID: monitor-server-event-group
      KAFKA_HEARTBEAT_GROUP_ID: monitor-heartbeat-group
      KAFKA_PING_RES_GROUP_ID: monitor-ping-res-group
    secrets:
      - monitor_db_password
      - download_report_api_key
    networks:
      - sm_network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.monitor.rule=PathPrefix(`/monitor`)"
        - "traefik.http.routers.monitor.middlewares=auth-and-cors"
        - "traefik.http.services.monitor.loadbalancer.server.port=8080"

#----------------------------------------- Heartbeat gateway ----------------------------------------- 
  heartbeat-gateway:
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-heartbeat-gateway:latest
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      <<: *kafka-env
    secrets:
      - heartbeat_api_key
    networks:
      - sm_network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.heartbeat.rule=PathPrefix(`/heartbeat`)"
        - "traefik.http.routers.heartbeat.middlewares=cors-mw"
        - "traefik.http.services.heartbeat.loadbalancer.server.port=8080"

#----------------------------------------- Ping worker ----------------------------------------- 
  ping-worker:
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-ping-worker:latest
    environment:
      APP_NUM_THREAD: 500
      <<: *kafka-env
      KAFKA_PING_REQ_GROUP_ID: worker-ping-req-group
    networks:
      - sm_network
    deploy:
      replicas: 2

#----------------------------------------- Mail worker ----------------------------------------- 
  mail-worker:
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-mail-worker:latest
    environment:
      REPORT_REPO_ADDR: monitor-service:8180
      <<: *kafka-env
      KAFKA_MAIL_GROUP_ID: worker-mail-group
      GOMAIL_ADDR: smtp.gmail.com
      GOMAIL_PORT: 587
      GOMAIL_FROM: le31052003@gmail.com
    secrets:
      - gomail_password
      - download_report_api_key
    networks:
      - sm_network
    deploy:
      replicas: 1

networks:
  sm_network:
    external: true
    name: sm_network      # cluster's network

secrets:
  auth_db_password:
    external: true
  jwt_access_secret:
    external: true
  jwt_refresh_secret:
    external: true
  server_db_password:
    external: true
  monitor_db_password:
    external: true
  download_report_api_key:
    external: true
  heartbeat_api_key:
    external: true
  gomail_password:
    external: true
