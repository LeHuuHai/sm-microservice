version: "3.8"

x-kafka-env: &kafka-env
  KAFKA_BROKER: kafka:29092
  KAFKA_HEARTBEAT_TOPIC: heartbeat
  KAFKA_MAIL_TOPIC: mail
  KAFKA_PING_TOPIC: ping
  KAFKA_PING_RES_TOPIC: ping_res
  KAFKA_SERVER_TOPIC: server_events

services:

#----------------------------------------- Init service ----------------------------------------- 
  init-service:
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-init-service:latest
    environment:
      AUTH_DB_HOST: auth-db
      AUTH_DB_PORT: 5432
      AUTH_DB_USER: admin
      AUTH_DB_DBNAME: auth_db
      SERVER_DB_HOST: server-db
      SERVER_DB_PORT: 5432
      SERVER_DB_USER: admin
      SERVER_DB_DBNAME: server_db
      MONITOR_DB_HOST: monitor-db
      MONITOR_DB_PORT: 5432
      MONITOR_DB_USER: admin
      MONITOR_DB_DBNAME: monitor_db
      ES_URL: http://monitor-elasticsearch:9200
      ES_INDEX: heartbeat
      <<: *kafka-env
    secrets:
      - auth_db_password
      - server_db_password
      - monitor_db_password
    networks:
      - sm_network
    deploy:
      restart_policy:
        condition: on-failure

networks:
  sm_network:
    external: true
    name: sm_network      # cluster's network

secrets:
  auth_db_password:
    external: true
  jwt_access_secret:
    external: true
  jwt_refresh_secret:
    external: true
  server_db_password:
    external: true
  monitor_db_password:
    external: true
  download_report_api_key:
    external: true
  heartbeat_api_key:
    external: true
  gomail_password:
    external: true
