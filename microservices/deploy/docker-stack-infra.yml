version: "3.8"

services:

#----------------------------------------- API gateway ----------------------------------------- 
  traefik:
    image: traefik:v2.10
    command:
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - sm_network
    deploy:
      placement:
        constraints:
          - node.role == manager

#----------------------------------------- Kafka ----------------------------------------- 
  kafka:
    image: apache/kafka:3.7.1
    environment:
      # KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Listeners
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Single node
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # KRaft cluster id
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_RETENTION_MS: 3600000        # Giữ message 1 giờ
      KAFKA_LOG_RETENTION_BYTES: -1          # Không giới hạn theo dung lượng (-1 = tắt)
      KAFKA_LOG_SEGMENT_BYTES: 104857600     # Segment 100MB (nhỏ hơn → xóa nhanh hơn)
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 60000  # Kiểm tra mỗi 1 phút
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    networks:
      - sm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

#----------------------------------------- Auth Infra ----------------------------------------- 
  auth-db:
    image: postgres:16
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/auth_db_password
      POSTGRES_DB: auth_db
    secrets:
      - auth_db_password
    networks:
      - sm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
  
  auth-redis:
    image: redis:7
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - auth_redis_data:/data
    environment:
      REDIS_DB: 0
    networks:
      - sm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

#----------------------------------------- Server Infra ----------------------------------------- 
  server-db:
    image: postgres:16
    volumes:
      - server_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/server_db_password
      POSTGRES_DB: server_db
    secrets:
      - server_db_password
    networks:
      - sm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

#----------------------------------------- Monitor Infra ----------------------------------------- 
  monitor-db:
    image: postgres:16
    volumes:
      - monitor_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/monitor_db_password
      POSTGRES_DB: monitor_db
    secrets:
      - monitor_db_password
    networks:
      - sm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  monitor-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    volumes:
      - es_data:/usr/share/elasticsearch/data
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    networks:
      - sm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  monitor-redis:
    image: redis:7
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - monitor_redis_data:/data
    environment:
      REDIS_DB: 0
    networks:
      - sm_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  sm_network:
    external: true
    name: sm_network      # cluster's network

secrets:
  auth_db_password:
    external: true
  server_db_password:
    external: true
  monitor_db_password:
    external: true

volumes:
  kafka_data:
  auth_db_data:
  auth_redis_data:
  server_db_data:
  monitor_db_data:
  es_data:
  monitor_redis_data:
