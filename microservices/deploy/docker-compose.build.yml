version: "3.8"

services:
  auth-service:
    build:
      context: ..
      dockerfile: deploy/microservices.dockerfile
      args:
        SERVICE_NAME: auth-service
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-auth-service:v1.0.0

  server-service:
    build:
      context: ..
      dockerfile: deploy/microservices.dockerfile
      args:
        SERVICE_NAME: server-service
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-server-service:v1.0.0

  monitor-service:
    build:
