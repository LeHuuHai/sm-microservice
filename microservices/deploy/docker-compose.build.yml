  ping-worker:
    build:
      context: ..
      dockerfile: deploy/microservices.dockerfile
      args:
        SERVICE_NAME: ping-worker
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-ping-worker:v1.0.0

  mail-worker:
    build:
      context: ..
      dockerfile: deploy/mail-worker.dockerfile
    image: ${DOCKER_REGISTRY:-hariii31}/server-management-mail-worker:v1.0.0

  agent:
    build:
      context: ..
