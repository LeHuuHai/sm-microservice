openapi: 3.0.3

info:
  title: Monitor Service API
  version: 1.0.0
  description: API for managing server monitoring and reports

servers:
  - url: http://localhost:8080

tags:
  - name: Server
  - name: File

security:
  - bearerAuth: []

paths:
  /servers/report:
    post:
      tags:
        - Server
      summary: Generate server report
      operationId: GenerateServerReport

      security:
        - bearerAuth:
            - server:report

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportServerRequest"

      responses:
        "202":
          description: Report generation queued successfully

        "400":
          $ref: "#/components/responses/BadRequest"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "500":
          $ref: "#/components/responses/InternalError"

components:
  schemas:
    ReportServerRequest:
      type: object
      required:
        - from
        - to
        - receivers

      properties:
        from:
          type: string
          format: date-time

        to:
          type: string
          format: date-time

        receivers:
          type: array
          items:
            type: string
            format: email

    ErrorResponse:
      type: object
      properties:
        code:
          type: string

        message:
          type: string

        request_id:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
            
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
