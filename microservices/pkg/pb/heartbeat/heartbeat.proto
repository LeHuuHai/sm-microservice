syntax = "proto3";

package heartbeat;

option go_package = "github.com/LeHuuHai/server-management/microservices/pkg/pb/heartbeat;heartbeatpb";

service HeartbeatService {
  rpc SendHeartbeat (SendHeartbeatRequest) returns (SendHeartbeatResponse);
}

message SendHeartbeatRequest {
  string server_id = 1;
  int64 timestamp  = 2;
}

message SendHeartbeatResponse {
  bool success = 1;
  string message = 2;
}
