syntax = "proto3";

package server;

option go_package = "github.com/LeHuuHai/server-management/microservices/pkg/pb/server;serverpb";

// Cấu trúc map với model.ServerProfile
message ServerProfile {
  string server_id = 1;
  string server_name = 2;
  string ipv4 = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
}

message CreateServerRequest {
  string server_id = 1;
  string server_name = 2;
  string ipv4 = 3;
}

message UpdateServerRequest {
  string server_id = 1;
  string server_name = 2;
  string ipv4 = 3;
}

message DeleteServerRequest {
  string server_id = 1;
}

message DeleteServerResponse {}

// Cấu trúc map với model.ListServerFilter
message ListServersRequest {
  int32 from = 1;
  int32 to = 2;
  string sort_field = 3;
  bool desc = 4;
}

// Cấu trúc map với model.ListServerResult
message ListServersResponse {
  repeated ServerProfile servers = 1;
  int32 total = 2;
}

message ImportServersRequest {
  bytes file_content = 1;
}

// Cấu trúc map với model.CreateBatchServerResult
message ImportServersResponse {
  repeated string success_ids = 1;
  repeated string failed_ids = 2;
  int32 success_cnt = 3;
  int32 failed_cnt = 4;
}

message ExportServersRequest {
  int32 from = 1;
  int32 to = 2;
  string sort_field = 3;
  bool desc = 4;
}

message ExportServersResponse {
  bytes file_content = 1;
  string file_name = 2;
}

service ServerService {
  rpc CreateServer(CreateServerRequest) returns (ServerProfile);
  rpc UpdateServer(UpdateServerRequest) returns (ServerProfile);
  rpc DeleteServer(DeleteServerRequest) returns (DeleteServerResponse);
  rpc ListServers(ListServersRequest) returns (ListServersResponse);
  rpc ImportServers(ImportServersRequest) returns (ImportServersResponse);
  rpc ExportServers(ExportServersRequest) returns (ExportServersResponse);
}
