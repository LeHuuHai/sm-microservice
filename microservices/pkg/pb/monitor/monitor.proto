syntax = "proto3";

package monitor;

option go_package = "github.com/LeHuuHai/server-management/microservices/pkg/pb/monitor;monitorpb";

// 1. Dành cho External (Gateway gọi vào)
service ReportManagementService {
  rpc GenerateReport (GenerateReportRequest) returns (GenerateReportResponse);
}
// 2. Dành cho Internal (Mail Worker gọi vào)
service InternalFileTransferService {
  rpc DownloadReport (DownloadReportRequest) returns (stream DownloadReportResponse);
}

message DownloadReportRequest {
  string filename = 1;
}

message DownloadReportResponse {
  bytes chunk_data = 1;
}

message GenerateReportRequest {
  int64 from_timestamp = 1;
  int64 to_timestamp = 2;
  repeated string receivers = 3;
}

message GenerateReportResponse {
  bool success = 1;
}

